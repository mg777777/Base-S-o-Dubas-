html,

a{

.topo{
	width:100%;

		#f3dfb1 45%,
		#d9a84f 100%

	padding:18px 20px 25px 20px;
}

.topo .borda{
	position:absolute;
	bottom:-17px;
	left:0;
	width:100%;
	height:17px;
	background:url(img/rodape.png) repeat-x;
	z-index:5;
}

.logo-topo{
	text-align:center;
	margin-bottom:18px;
}

.logo-topo img{
	width:260px;

	filter:
	drop-shadow(0 8px 18px rgba(0,0,0,.18));
}

.topo-botoes{
	width:100%;
	display:flex;
	align-items:center;
	justify-content:space-between;
	flex-wrap:wrap;

	max-width:920px;
	margin:0 auto;
}

.grupo-esquerda,
.grupo-centro,
.grupo-direita{
	display:flex;
	align-items:center;
	gap:16px;
}

.topo-botoes a{
	width:88px;
	height:88px;

	border-radius:50%;

	display:flex;
	align-items:center;
	justify-content:center;

	background:#ffffff;

	box-shadow:
	0 10px 24px rgba(0,0,0,.15);

	transition:.3s;

	border:3px solid rgba(255,255,255,.5);
}

.topo-botoes a:hover{
	transform:translateY(-5px) scale(1.05);
}

.topo-botoes a img{
	width:50px;
	height:50px;
	object-fit:contain;
	display:block;
}

.banner{
	width:100%;
	height:88vh;

	position:relative;
	overflow:hidden;
}

.banner-slide{
	position:absolute;
	inset:0;

	background-size:cover;
	background-position:center;

	opacity:0;

	animation:slideShow 35s infinite;
}

.slide1{
	background-image:url(foto1.jpg);
	animation-delay:0s;
}

.slide2{
	background-image:url(foto2.jpg);
	background-size:88%;
	background-repeat:no-repeat;
	background-position:center center;
	animation-delay:5s;
}

.slide3{
	background-image:url(foto3.jpg);
	animation-delay:10s;
}

.slide4{
	background-image:url(foto4.jpg);
	animation-delay:15s;
}

.slide5{
	background-image:url(foto5.jpg);
	animation-delay:20s;
}

.slide6{
	background-image:url(foto6.jpg);
	background-size:82%;
	background-repeat:no-repeat;
	background-position:center center;
	animation-delay:25s;
}

.slide7{
	background-image:url(foto7.jpg);
	animation-delay:30s;
}

@keyframes slideShow{

	0%{
		opacity:0;
		transform:scale(1);
	}

	5%{
		opacity:1;
	}

	17%{
		opacity:1;
	}

	23%{
		opacity:0;
		transform:scale(1.05);
	}

	100%{
		opacity:0;
	}
}

.banner-overlay{
	position:absolute;
	inset:0;

	background:
	linear-gradient(
		rgba(48,20,8,.45),
		rgba(48,20,8,.65)
	);

	z-index:1;
}

.banner-conteudo{
	position:absolute;
	top:50%;
	left:50%;

	transform:translate(-50%,-50%);

	text-align:center;

	width:90%;
	max-width:950px;

	z-index:2;

}

.botao-principal:hover{

}

.mapa-box{

.mapa-titulo{

.mapa-texto{

}

.botao-maps{

		#ffca54,
		#d99018

	color:#4d2814;

	padding:14px 28px;

	border-radius:45px;

	font-family:"FestivoLC-Basic",Verdana, Geneva, sans-serif;

	font-size:20px;

	text-transform:uppercase;

	box-shadow:
	0 10px 25px rgba(0,0,0,.18);

	margin-bottom:25px;

}

.botao-maps:hover{

.mapa{
